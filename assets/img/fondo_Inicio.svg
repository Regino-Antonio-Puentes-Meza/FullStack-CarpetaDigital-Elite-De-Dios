<svg viewBox="0 0 1440 900" width="100%" height="100vh" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Arca de Noé - Fondo Animado</title>
  <desc>Fondo animado infantil del Arca de Noé con animales, olas y arcoíris completo</desc>

  <style>
    .nubes1 { animation: nubes-lento 30s linear infinite; }
    .nubes2 { animation: nubes-medio 22s linear infinite; }
    .nubes3 { animation: nubes-rapido 16s linear infinite; }
    .olas1 { animation: olas-mov1 12s linear infinite; }
    .olas2 { animation: olas-mov2 18s linear infinite; }
    .olas3 { animation: olas-mov3 24s linear infinite; }
    .arca { animation: navegar-arca 40s linear infinite; }
    .aves-fondo { animation: volar-lento 25s linear infinite; }
    .reflejo-agua { animation: ondular 3s ease-in-out infinite alternate; }
    .espuma-base { animation: espuma-ondular 6s ease-in-out infinite alternate; }
    .espuma-burbujas { animation: burbujas-flotacion 4.5s ease-in-out infinite alternate; }
    .espuma-turbulencia { animation: turbulencia 3.2s ease-in-out infinite alternate; }
    .espuma-casco { animation: espuma-casco 6s ease-in-out infinite alternate; }

    @keyframes nubes-lento { 0%{transform:translateX(-200px)} 100%{transform:translateX(1640px)} }
    @keyframes nubes-medio { 0%{transform:translateX(-150px)} 100%{transform:translateX(1590px)} }
    @keyframes nubes-rapido{ 0%{transform:translateX(-100px)} 100%{transform:translateX(1540px)} }
    @keyframes olas-mov1   { 0%{transform:translateX(0)}     100%{transform:translateX(-200px)} }
    @keyframes olas-mov2   { 0%{transform:translateX(0)}     100%{transform:translateX(-300px)} }
    @keyframes olas-mov3   { 0%{transform:translateX(0)}     100%{transform:translateX(-250px)} }
    @keyframes navegar-arca {
      0% { transform: translateX(-890px) rotate(-0.5deg) translateY(0); }
      100% { transform: translateX(1080px) rotate(-0.5deg) translateY(0); }
    }
    @keyframes volar-lento {
      0%{transform:translateX(-80px) translateY(0)}
      50%{transform:translateX(760px) translateY(-15px)}
      100%{transform:translateX(1520px) translateY(0)}
    }
    @keyframes ondular     { 0%{opacity:.2; transform:scaleY(.8)} 100%{opacity:.5; transform:scaleY(1.2)} }
    @keyframes espuma-ondular { 
      0%{opacity:.4; transform:translateY(2px) scaleX(.95)} 
      100%{opacity:.7; transform:translateY(-1px) scaleX(1.05)} 
    }
    @keyframes burbujas-flotacion { 
      0%{opacity:.6; transform:translateY(1px) scale(.98)} 
      100%{opacity:.9; transform:translateY(-3px) scale(1.02)} 
    }
    @keyframes turbulencia { 
      0%{opacity:.5; transform:translateX(-2px) scaleY(.9)} 
      100%{opacity:.8; transform:translateX(2px) scaleY(1.1)} 
    }
    @keyframes espuma-casco { 
      0%{opacity:.4; transform:scaleX(.95)} 
      100%{opacity:.7; transform:scaleX(1.05)} 
    }
  </style>

  <defs>
    <!-- Cielos y materiales -->
    <linearGradient id="cieloGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE4B5"/>
      <stop offset="35%"  stop-color="#87CEEB"/>
      <stop offset="70%"  stop-color="#B6E5F7"/>
      <stop offset="100%" stop-color="#E0F6FF"/>
    </linearGradient>

    <radialGradient id="solGrad" cx="20%" cy="15%">
      <stop offset="0%" stop-color="#FFF8DC" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#FFEB3B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFEB3B" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="aguaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#5DADE2"/>
      <stop offset="100%" stop-color="#2E86AB"/>
    </linearGradient>

    <linearGradient id="maderaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#DEB887"/>
      <stop offset="100%" stop-color="#CD853F"/>
    </linearGradient>

    <!-- Clip para reflejos bajo el agua -->
    <clipPath id="clipAgua">
      <rect x="0" y="580" width="1440" height="320"/>
    </clipPath>

    <!-- Máscara de reflejo -->
    <mask id="reflejoMask">
      <linearGradient id="reflejoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="white" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </linearGradient>
      <rect width="100%" height="100%" fill="url(#reflejoGrad)"/>
    </mask>

    <!-- Nube y ave reutilizables -->
    <g id="nube">
      <ellipse cx="0" cy="0" rx="35" ry="20" fill="white" opacity="0.9"/>
      <ellipse cx="-25" cy="8" rx="28" ry="16" fill="white" opacity="0.9"/>
      <ellipse cx="25" cy="5" rx="22" ry="14" fill="white" opacity="0.9"/>
    </g>
    <g id="ave">
      <path d="M0,0 Q-10,-6 -18,0 Q-10,6 0,0 Q10,-6 18,0 Q10,6 0,0" fill="#F39C12" opacity="0.6"/>
    </g>

    <!-- Patrón de olas -->
    <pattern id="olas" x="0" y="0" width="200" height="30" patternUnits="userSpaceOnUse">
      <path d="M0,15 Q50,5 100,15 Q150,25 200,15" stroke="white" stroke-width="2" fill="none" opacity="0.55"/>
    </pattern>

    <!-- Filtros mejorados para espuma realista -->
    <filter id="blurSuave" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glowArcoiris" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="espumaRealista" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
      <feOffset dx="0" dy="1"/>
    </filter>
    <filter id="burbujasSuave" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>

    <!-- Gradiente sutil a lo largo del trazo del arcoíris (para variar luminosidad) -->
    <linearGradient id="lumArc" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Fondo cielo y sol -->
  <rect width="100%" height="100%" fill="url(#cieloGrad)"/>
  <ellipse cx="300" cy="120" rx="120" ry="120" fill="url(#solGrad)"/>

  <!-- ARCOÍRIS COMPLETO (semicírculo realista, “alejado”) -->
  <!-- Centro en (720,900), radios decrecientes para cada color -->
  <g id="arcoiris" transform="translate(0,-25) scale(0.98)" opacity="0.9">
    <!-- Capa de glow suave -->
    <path d="M70,900 A650,650 0 0 1 1370,900"
          fill="none" stroke="white" stroke-width="26" opacity="0.08" filter="url(#glowArcoiris)"/>
    <!-- ROYGBIV + capa luminosa -->
    <path d="M70,900 A650,650 0 0 1 1370,900" fill="none" stroke="#FF0000" stroke-width="20" opacity="0.65" filter="url(#blurSuave)"/>
    <path d="M82,900 A638,638 0 0 1 1358,900" fill="none" stroke="#FF7F00" stroke-width="20" opacity="0.6"  filter="url(#blurSuave)"/>
    <path d="M94,900 A626,626 0 0 1 1346,900" fill="none" stroke="#FFFF00" stroke-width="20" opacity="0.55" filter="url(#blurSuave)"/>
    <path d="M106,900 A614,614 0 0 1 1334,900" fill="none" stroke="#00FF00" stroke-width="20" opacity="0.5"  filter="url(#blurSuave)"/>
    <path d="M118,900 A602,602 0 0 1 1322,900" fill="none" stroke="#0000FF" stroke-width="20" opacity="0.5"  filter="url(#blurSuave)"/>
    <path d="M130,900 A590,590 0 0 1 1310,900" fill="none" stroke="#4B0082" stroke-width="20" opacity="0.45" filter="url(#blurSuave)"/>
    <path d="M142,900 A578,578 0 0 1 1298,900" fill="none" stroke="#8F00FF" stroke-width="20" opacity="0.4"  filter="url(#blurSuave)"/>
    <!-- Sutil brillo longitudinal para “realismo” -->
    <path d="M70,900 A650,650 0 0 1 1370,900" fill="none" stroke="url(#lumArc)" stroke-width="120" opacity="0.12"/>
  </g>

  <!-- Nubes -->
  <g class="nubes1">
    <use href="#nube" x="100"  y="150" transform="scale(1.6)"/>
    <use href="#nube" x="400"  y="120" transform="scale(1.3)"/>
    <use href="#nube" x="800"  y="180" transform="scale(1.8)"/>
    <use href="#nube" x="1200" y="140" transform="scale(1.4)"/>
    <use href="#nube" x="1500" y="160" transform="scale(1.7)"/>
  </g>
  <g class="nubes2">
    <use href="#nube" x="200"  y="200" transform="scale(1.2)"/>
    <use href="#nube" x="600"  y="170" transform="scale(1.5)"/>
    <use href="#nube" x="1000" y="190" transform="scale(1.3)"/>
    <use href="#nube" x="1400" y="180" transform="scale(1.6)"/>
  </g>
  <g class="nubes3">
    <use href="#nube" x="50"  y="240" transform="scale(1.1)"/>
    <use href="#nube" x="350" y="220" transform="scale(1.4)"/>
    <use href="#nube" x="750" y="250" transform="scale(1.2)"/>
    <use href="#nube" x="1150" y="230" transform="scale(1.5)"/>
  </g>

  <!-- Aves -->
  <g class="aves-fondo">
    <use href="#ave" x="0" y="280"/>
    <use href="#ave" x="40" y="290"/>
    <use href="#ave" x="80" y="285"/>
  </g>

  <!-- Agua -->
  <rect x="0" y="580" width="100%" height="320" fill="url(#aguaGrad)"/>
  <g class="olas1">
    <rect x="0" y="580" width="1640" height="30" fill="url(#olas)" opacity="0.7"/>
    <rect x="1640" y="580" width="1640" height="30" fill="url(#olas)" opacity="0.7"/>
  </g>
  <g class="olas2">
    <rect x="0" y="600" width="1740" height="25" fill="url(#olas)" opacity="0.6"/>
    <rect x="1740" y="600" width="1740" height="25" fill="url(#olas)" opacity="0.6"/>
  </g>
  <g class="olas3">
    <rect x="0" y="620" width="1690" height="20" fill="url(#olas)" opacity="0.5"/>
    <rect x="1690" y="620" width="1690" height="20" fill="url(#olas)" opacity="0.5"/>
  </g>

  <!-- Arca navegando -->
  <g class="arca">
    <path d="M520,520 Q720,500 920,520 L900,580 Q720,590 540,580 Z" fill="url(#maderaGrad)" stroke="#8B4513" stroke-width="3"/>
    <line x1="550" y1="510" x2="890" y2="510" stroke="#8B4513" stroke-width="1" opacity="0.4"/>
    <line x1="545" y1="530" x2="895" y2="530" stroke="#8B4513" stroke-width="1" opacity="0.4"/>
    <line x1="540" y1="550" x2="900" y2="550" stroke="#8B4513" stroke-width="1" opacity="0.4"/>
    <rect x="600" y="420" width="240" height="100" rx="20" fill="url(#maderaGrad)" stroke="#8B4513" stroke-width="2"/>
    <path d="M580,420 Q720,380 860,420 L840,400 Q720,360 600,400 Z" fill="#F8C471" stroke="#8B4513" stroke-width="2"/>
    <circle cx="650" cy="460" r="15" fill="#87CEEB" stroke="#8B4513" stroke-width="2"/>
    <circle cx="720" cy="455" r="18" fill="#87CEEB" stroke="#8B4513" stroke-width="2"/>
    <circle cx="790" cy="460" r="15" fill="#87CEEB" stroke="#8B4513" stroke-width="2"/>
    <rect x="700" y="480" width="40" height="40" rx="20" fill="#8B4513" stroke="#654321" stroke-width="2"/>

    <!-- Animales ajustados a nueva posición -->
    <g transform="translate(620,390)">
      <ellipse cx="0" cy="30" rx="8" ry="20" fill="#F4D03F"/>
      <circle cx="0" cy="10" r="12" fill="#F4D03F"/>
      <circle cx="-4" cy="5" r="2" fill="black"/>
      <circle cx="4" cy="5" r="2" fill="black"/>
      <ellipse cx="-2" cy="0" rx="3" ry="2" fill="#E67E22"/>
      <ellipse cx="2" cy="0" rx="3" ry="2" fill="#E67E22"/>
      <circle cx="0" cy="15" r="8" fill="pink" opacity="0.6"/>
    </g>

    <g transform="translate(750,410)">
      <circle cx="0" cy="20" r="25" fill="#BDC3C7"/>
      <ellipse cx="0" cy="35" rx="8" ry="15" fill="#95A5A6"/>
      <circle cx="-8" cy="15" r="3" fill="black"/>
      <circle cx="8" cy="15" r="3" fill="black"/>
      <ellipse cx="0" cy="45" rx="4" ry="8" fill="#95A5A6"/>
    </g>

    <g transform="translate(680,405)">
      <circle cx="0" cy="20" r="18" fill="#F39C12"/>
      <circle cx="0" cy="20" r="12" fill="#E67E22"/>
      <circle cx="-5" cy="18" r="2" fill="black"/>
      <circle cx="5" cy="18" r="2" fill="black"/>
      <path d="M-3,25 Q0,28 3,25" stroke="black" stroke-width="2" fill="none"/>
    </g>

    <g transform="translate(800,385)">
      <ellipse cx="0" cy="10" rx="6" ry="8" fill="#3498DB"/>
      <circle cx="0" cy="3" r="5" fill="#2980B9"/>
      <circle cx="-2" cy="2" r="1" fill="black"/>
      <circle cx="2" cy="2" r="1" fill="black"/>
      <path d="M-8,8 Q-12,5 -8,3" fill="#F39C12"/>
      <path d="M 8,8 Q 12,5  8,3" fill="#F39C12"/>
    </g>

    <!-- ESPUMA PEGADA AL CASCO -->
    <g class="espuma-casco">
      <!-- Espuma principal adherida al casco -->
      <path d="M540,578 Q590,574 640,576 Q690,578 720,579 Q750,578 800,576 Q850,574 900,578 
               Q880,584 830,586 Q780,588 720,587 Q660,588 610,586 Q560,584 540,578 Z"
            fill="white" opacity="0.45" filter="url(#espumaRealista)"/>
      
      <!-- Línea de espuma en contacto directo -->
      <path d="M545,579 Q595,575 645,577 Q695,579 720,580 Q745,579 795,577 Q845,575 895,579"
            fill="none" stroke="white" stroke-width="4" opacity="0.8" filter="url(#burbujasSuave)"/>
      
      <!-- Espuma lateral de estela -->
      <path d="M520,579 Q540,576 560,581 Q580,584 600,582"
            fill="none" stroke="white" stroke-width="2.5" opacity="0.6" filter="url(#burbujasSuave)"/>
      <path d="M840,582 Q860,584 880,581 Q900,576 920,579"
            fill="none" stroke="white" stroke-width="2.5" opacity="0.6" filter="url(#burbujasSuave)"/>
    </g>
  </g>

  <!-- Reflejos dinámicos bajo el agua -->
  <g clip-path="url(#clipAgua)">
    <g class="arca">
      <g transform="translate(0,600) scale(1,-0.4)" mask="url(#reflejoMask)" class="reflejo-agua">
        <path d="M520,-40 Q720,-60 920,-40 L900,20 Q720,40 540,20 Z" fill="url(#maderaGrad)" opacity="0.25"/>
        <rect x="600" y="-100" width="240" height="60" rx="20" fill="url(#maderaGrad)" opacity="0.25"/>
      </g>
    </g>
  </g>

  <!-- ESPUMA AJUSTADA - En la línea de agua -->
  <!-- Capa base de turbulencia difusa -->
  <g class="espuma-base">
    <path d="M530,578 Q580,574 630,576 Q680,578 720,579 Q760,578 810,576 Q860,574 910,578 
             Q880,586 830,588 Q780,590 720,589 Q660,590 610,588 Q560,586 530,578 Z"
          fill="white" opacity="0.35" filter="url(#espumaRealista)"/>
    <path d="M540,580 Q590,576 640,578 Q690,580 720,581 Q750,580 800,578 Q850,576 900,580
             Q870,584 820,586 Q770,587 720,586 Q670,587 620,586 Q570,584 540,580 Z"
          fill="white" opacity="0.25" filter="url(#espumaRealista)"/>
  </g>
  <!-- Burbujas orgánicas en la superficie -->
  <g class="espuma-burbujas">
    <!-- Burbujas principales en la proa -->
    <ellipse cx="545" cy="581" rx="6" ry="4" fill="white" opacity="0.8" filter="url(#burbujasSuave)"/>
    <circle cx="562" cy="583" r="3.5" fill="white" opacity="0.85"/>
    <circle cx="578" cy="585" r="2.8" fill="white" opacity="0.75"/>
    <ellipse cx="595" cy="584" rx="4.5" ry="3" fill="white" opacity="0.8"/>
    
    <!-- Burbujas centro del casco -->
    <circle cx="620" cy="586" r="2.2" fill="white" opacity="0.7"/>
    <ellipse cx="645" cy="587" rx="3.8" ry="2.5" fill="white" opacity="0.82"/>
    <circle cx="670" cy="588" r="3.0" fill="white" opacity="0.78"/>
    <circle cx="695" cy="587" r="2.5" fill="white" opacity="0.75"/>
    <ellipse cx="720" cy="589" rx="4.2" ry="2.8" fill="white" opacity="0.85"/>
    <circle cx="745" cy="587" r="2.8" fill="white" opacity="0.77"/>
    <circle cx="770" cy="588" r="3.2" fill="white" opacity="0.8"/>
    <ellipse cx="795" cy="587" rx="3.6" ry="2.4" fill="white" opacity="0.83"/>
    
    <!-- Burbujas en la popa -->
    <circle cx="820" cy="586" r="2.4" fill="white" opacity="0.72"/>
    <ellipse cx="845" cy="584" rx="4.0" ry="2.7" fill="white" opacity="0.8"/>
    <circle cx="870" cy="583" r="3.1" fill="white" opacity="0.76"/>
    <circle cx="890" cy="585" r="2.6" fill="white" opacity="0.74"/>
    <ellipse cx="910" cy="581" rx="5.5" ry="3.5" fill="white" opacity="0.8" filter="url(#burbujasSuave)"/>
    
    <!-- Micro burbujas dispersas -->
    <circle cx="555" cy="590" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="585" cy="591" r="1.2" fill="white" opacity="0.65"/>
    <circle cx="635" cy="592" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="685" cy="593" r="1.4" fill="white" opacity="0.62"/>
    <circle cx="735" cy="592" r="1.6" fill="white" opacity="0.68"/>
    <circle cx="785" cy="591" r="1.3" fill="white" opacity="0.64"/>
    <circle cx="835" cy="590" r="1.7" fill="white" opacity="0.69"/>
    <circle cx="885" cy="589" r="1.4" fill="white" opacity="0.66"/>
  </g>
</svg>
