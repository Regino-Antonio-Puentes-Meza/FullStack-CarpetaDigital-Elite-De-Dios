<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">

  <defs>
    <!-- CIELO -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3f87c6"/>
      <stop offset="50%" stop-color="#6fb3e6"/>
      <stop offset="100%" stop-color="#f2e1b0"/>
    </linearGradient>

    <!-- SOL -->
    <radialGradient id="sunCore" cx="75%" cy="20%" r="12%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#fff3c4"/>
      <stop offset="100%" stop-color="#fff3c4" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sunGlow" cx="75%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#fff3c4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff3c4" stop-opacity="0"/>
    </radialGradient>

    <!-- DUNAS -->
    <linearGradient id="duneFar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ddb5"/>
      <stop offset="100%" stop-color="#e6cfa3"/>
    </linearGradient>

    <linearGradient id="duneFar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8cfa0"/>
      <stop offset="100%" stop-color="#dcb98c"/>
    </linearGradient>

    <linearGradient id="duneMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d9b982"/>
      <stop offset="100%" stop-color="#caa06d"/>
    </linearGradient>

    <linearGradient id="duneNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#caa06d"/>
      <stop offset="100%" stop-color="#b88c58"/>
    </linearGradient>

    <!-- BLUR DUNAS -->
    <filter id="duneBlurFar">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <filter id="duneBlurMid">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- NUBES -->
    <radialGradient id="cloudSoft" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#f2f2f2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e0e0e0" stop-opacity="0.25"/>
    </radialGradient>

    <filter id="cloudBlur">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

  </defs>

  <!-- CIELO -->
  <rect width="100%" height="100%" fill="url(#skyGrad)" />

  <!-- SOL -->
  <circle cx="1200" cy="160" r="140" fill="url(#sunCore)" />
  <circle cx="1200" cy="160" r="360" fill="url(#sunGlow)" />

  <!-- 🏜️ DUNAS LEJANAS (MUY DIFUMINADAS) -->
  <path d="M0 520 Q400 480 800 520 T1600 500 V900 H0 Z"
        fill="url(#duneFar1)" opacity="0.45"
        filter="url(#duneBlurFar)"/>

  <path d="M0 580 Q500 530 1000 580 T1600 560 V900 H0 Z"
        fill="url(#duneFar2)" opacity="0.55"
        filter="url(#duneBlurFar)"/>

  <!-- 🏜️ DUNA MEDIA -->
  <path d="M0 650 Q400 600 800 650 T1600 630 V900 H0 Z"
        fill="url(#duneMid)" opacity="0.75"
        filter="url(#duneBlurMid)"/>

  <!-- 🏜️ DUNA CERCANA -->
  <path d="M0 750 Q500 690 1000 750 T1600 720 V900 H0 Z"
        fill="url(#duneNear)"/>

  <!-- ☁️ NUBES -->
  <g filter="url(#cloudBlur)" opacity="0.7">
    <g>

      <!-- NUBES PRINCIPALES -->
      <ellipse cx="200" cy="220" rx="180" ry="80" fill="url(#cloudSoft)"/>
      <ellipse cx="320" cy="200" rx="140" ry="70" fill="url(#cloudSoft)"/>
      <ellipse cx="900" cy="250" rx="200" ry="90" fill="url(#cloudSoft)"/>
      <ellipse cx="1100" cy="230" rx="150" ry="70" fill="url(#cloudSoft)"/>

      <!-- SECUNDARIAS -->
      <ellipse cx="500" cy="150" rx="140" ry="60" fill="url(#cloudSoft)" opacity="0.6"/>
      <ellipse cx="1300" cy="200" rx="160" ry="70" fill="url(#cloudSoft)" opacity="0.6"/>
      <ellipse cx="700" cy="300" rx="130" ry="60" fill="url(#cloudSoft)" opacity="0.5"/>

      <!-- LOOP -->
      <g transform="translate(1600,0)">
        <ellipse cx="200" cy="220" rx="180" ry="80" fill="url(#cloudSoft)"/>
        <ellipse cx="320" cy="200" rx="140" ry="70" fill="url(#cloudSoft)"/>
        <ellipse cx="900" cy="250" rx="200" ry="90" fill="url(#cloudSoft)"/>
        <ellipse cx="1100" cy="230" rx="150" ry="70" fill="url(#cloudSoft)"/>
        <ellipse cx="500" cy="150" rx="140" ry="60" fill="url(#cloudSoft)"/>
        <ellipse cx="1300" cy="200" rx="160" ry="70" fill="url(#cloudSoft)"/>
        <ellipse cx="700" cy="300" rx="130" ry="60" fill="url(#cloudSoft)"/>
      </g>

      <!-- VELOCIDAD AJUSTADA -->
      <animateTransform
        attributeName="transform"
        type="translate"
        from="0 0"
        to="-1600 0"
        dur="65s"
        repeatCount="indefinite"/>

    </g>
  </g>

  <!-- MOVIMIENTO GLOBAL -->
  <animateTransform attributeName="transform"
    type="translate"
    values="0 0; 0 5; 0 0"
    dur="40s"
    repeatCount="indefinite"/>

</svg>