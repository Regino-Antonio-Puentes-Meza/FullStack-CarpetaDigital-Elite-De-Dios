<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Calendario Litúrgico</title>
    <link rel="icon" href="../assets/img/logo-club.jpeg" type="image/jpeg">
    <link rel="preload" as="image" href="../assets/img/fondo-menu-santuario.webp">
    <link rel="stylesheet" href="../assets/css/actividades.css" />
    <!-- Font Awesome para iconos espirituales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts para mejor tipografía -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Protecciones de seguridad -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        /* Protección selectiva - preserva funcionalidad UI */
        * {
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-user-drag: none !important;
            -webkit-touch-callout: none !important;
        }

        /* Permitir interacción en elementos funcionales */
        button,
        .back-button,
        .activity-card,
        .download-btn,
        .calendar-day {
            pointer-events: auto !important;
        }

        /* Proteger solo imágenes no interactivas */
        .club-logo {
            -webkit-user-drag: none !important;
            pointer-events: auto !important;
            border-radius: 50% !important;
            /* Mantener hover del logo */
        }

        /* Proteger imágenes pero permitir funcionalidad */
        .activity-card img {
            -webkit-user-drag: none !important;
            pointer-events: auto !important;
            /* Permitir clicks para funcionalidad */
        }
    </style>
</head>

<body class="fade-in">
    <!-- Logo del Club reubicado a la derecha -->
    <div class="club-logo-container">
        <img src="../assets/img/logo-club.jpeg" alt="Logo Élite De Dios" class="club-logo">
    </div>

    <!-- Visor PDF tipo museo náutico -->
    <div id="pdfModal" class="pdf-modal">
        <div class="pdf-content">
            <button class="close-pdf" onclick="cerrarPDF()">
                <i class="fas fa-times"></i>
            </button>
            <!-- Indicador de carga -->
            <div id="pdfLoader" class="pdf-loader">
                <div class="spinner"></div>
                <p>Cargando documento...</p>
            </div>
            <iframe id="pdfViewer" src="" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Encabezado profesional del calendario -->
    <header class="adventures-header">
        <div class="header-content">
            <h1 class="adventures-title">
                <i class="fas fa-dove"></i>
                Calendario Litúrgico
            </h1>
            <div class="adventures-motto">
                <i class="fas fa-praying-hands"></i>
                <span>Programación oficial de ceremonias y formación</span>
                <i class="fas fa-scroll"></i>
            </div>
        </div>
    </header>

    <!-- Botón de regreso mejorado -->
    <button class="back-button" onclick="window.location.href='./pag-menu-principal.html'">
        <i class="fas fa-arrow-left"></i>
        <span>Regresar al Archivo</span>
    </button>

    <!-- Contenido principal -->
    <div class="page-content">

        <!-- Sección Cronograma -->
        <section class="schedule-section pdf-section">
            <div class="section-container">
                <div class="section-content">
                    <div class="schedule-intro">
                        <p class="section-text">
                            Mantente informado con nuestro <span class="highlight">calendario oficial</span>
                            de actividades, ceremonias y momentos especiales del club. Cada fecha representa
                            una oportunidad para crecer juntos, fortalecer la fe y servir a Dios.
                        </p>
                    </div>

                    <!-- Calendario Dinámico -->
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <button id="prevMonth" class="nav-button">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <h2 id="monthTitle"></h2>
                            <button id="nextMonth" class="nav-button">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                        <div id="calendarEvents"></div>
                    </div>

                    <!-- Botones para PDFs del cronograma -->
                    <div class="schedule-pdf-section">
                        <div class="pdf-buttons-grid">
                            <button class="view-schedule-pdf future"
                                onclick="abrirPDF('../assets/docs/cronograma-actividades.pdf')">
                                <div class="pdf-icon">
                                    <i class="fas fa-calendar-check"></i>
                                </div>
                                <div class="pdf-content-text">
                                    <h4>Cronograma de actividades en PDF</h4>
                                    <p>Fechas especiales, ceremonias y momentos de crecimiento espiritual en 2026</p>
                                </div>
                                <div class="pdf-arrow">
                                    <i class="fas fa-external-link-alt"></i>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="../assets/js/calendario-actividades.js"></script>
    <script>
        // Variable para rastrear PDF actual en caché
        let currentPdfUrl = '';
        
        // Registro de Service Worker para caching optimizado
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../assets/js/service-worker.js')
                    .then((registration) => {
                        console.log('✅ Service Worker registrado:', registration);
                    })
                    .catch((error) => {
                        console.log('⚠️ Service Worker no disponible:', error);
                    });
            });
        }

        // Cache en memoria para PDFs durante la sesión
        const pdfCache = {};

        // Animación de entrada de página mejorada
        document.addEventListener("DOMContentLoaded", () => {
            // Remover fade-out y aplicar fade-in
            document.body.classList.remove("fade-out");
            document.body.classList.add("fade-in");

            // Forzar visibilidad inmediata de todas las secciones
            setTimeout(() => {
                const sections = document.querySelectorAll('.pdf-section');
                sections.forEach((section, index) => {
                    setTimeout(() => {
                        section.classList.add('visible');
                        section.style.opacity = '1';
                        section.style.transform = 'translateY(0)';
                    }, index * 200);
                });
            }, 100);

            // Configurar Intersection Observer para animaciones progresivas
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);

            // Observar todas las secciones con animación
            document.querySelectorAll('.pdf-section').forEach(section => {
                observer.observe(section);
            });

            // Asegurar que todos los elementos estén visibles después de 2 segundos
            setTimeout(() => {
                document.querySelectorAll('.pdf-section').forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                    el.classList.add('visible');
                });
            }, 2000);
        });

        // Función para abrir PDFs - Patrón probado de nuestra-historia.html
        function abrirPDF(ruta) {
            console.log('📄 Abriendo PDF:', ruta);
            const modal = document.getElementById('pdfModal');
            const viewer = document.getElementById('pdfViewer');
            const loader = document.getElementById('pdfLoader');
            
            if (!modal || !viewer) return;
            
            // Mostrar modal inmediatamente
            modal.style.display = 'flex';
            modal.classList.add('visible');
            document.body.style.overflow = 'hidden';
            
            // Si es el mismo PDF y ya está cargado, no recargar
            if (currentPdfUrl === ruta && viewer.src) {
                console.log('⚡ PDF en caché, apertura instantánea');
                if (loader) loader.style.display = 'none';
                viewer.style.opacity = '1';
                return;
            }
            
            // Mostrar loader solo para PDFs nuevos
            if (loader && currentPdfUrl !== ruta) {
                loader.style.display = 'flex';
            }
            
            // Configurar eventos de carga
            viewer.onload = () => {
                if (loader) loader.style.display = 'none';
                viewer.style.opacity = '1';
                currentPdfUrl = ruta;
                console.log('✅ PDF cargado y cacheado');
            };
            
            // Cargar PDF
            viewer.src = ruta;
        }

        // Función para cerrar PDFs
        function cerrarPDF() {
            const modal = document.getElementById('pdfModal');
            const viewer = document.getElementById('pdfViewer');
            const loader = document.getElementById('pdfLoader');

            if (modal && viewer) {
                modal.style.display = 'none';
                modal.classList.remove('visible');
                viewer.style.opacity = '1';
                document.body.style.overflow = 'auto';
                // No limpiar src para mantener caché en memoria
            }
        }

        // Cerrar modal al hacer clic fuera del contenido
        document.getElementById('pdfModal')?.addEventListener('click', function (e) {
            if (e.target === this) {
                cerrarPDF();
            }
        });

        // Manejar tecla Escape para cerrar modal
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                cerrarPDF();
            }
        });
    </script>

    </script>

    </script>

    <!-- Scripts de protección -->
    <script src="../assets/js/protection.js"></script>
    <script src="../assets/js/advanced-protection.js"></script>
</body>

</html>
