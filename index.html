<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carpeta Digital -Elíte de Dios</title>
  <link rel="icon" href="./assets/img/logo-club.jpeg" type="image/jpeg">   
  
  <!-- Estilos del Santuario -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive-santuario.css" />
  
  <!-- Tipografía Sagrada - Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Protecciones de seguridad -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <style>
    /* Protección selectiva - preserva funcionalidad UI */
    * { 
      -webkit-user-select: none !important; 
      -moz-user-select: none !important; 
      -ms-user-select: none !important; 
      user-select: none !important;
      -webkit-user-drag: none !important;
      -webkit-touch-callout: none !important;
    }
    body { 
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      user-select: none !important;
      pointer-events: auto !important;
    }
    /* Permitir interacción en elementos funcionales */
    button, .splash-button, .enter-button, .enter-btn, #enter-sanctuary-btn { 
      pointer-events: auto !important;
    }
    /* Proteger imágenes pero permitir funcionalidad */
    img { 
      -webkit-user-drag: none !important;
      pointer-events: auto !important;
    }
    /* Asegurar visibilidad del botón */
    .enter-btn {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
  </style>
</head>
<body>

  <!-- ⏳ Indicador de Carga Inicial -->
  <div id="loading-screen" class="loading-screen">
    <div class="loader-container">
      <div class="spinner"></div>
      <p class="loading-text">Cargando Santuario...</p>
    </div>
  </div>

  <!-- 🖼️ Precargar imagen de fondo (invisible) -->
  <img src="assets/img/fondo-incio-santuario_carpeta.webp" alt="" style="display: none; visibility: hidden;" class="preload-background">

  <!-- 🌥️ Nubes Animadas de Fondo (Como imagen visible) -->
  <img src="assets/img/animated-cloud.svg" alt="Nubes animadas" class="animated-clouds">

  <!-- 🏛️ Pantalla de Bienvenida del Santuario -->
  <div id="splash-screen" class="splash-screen">
    
    <!-- �🌊 Velo de colores visible adicional -->
    <div class="velo-colores-visible"></div>
    
    <!-- Imagen Hero del Santuario (se agregará después) -->
    <!-- <img src="assets/img/santuario-hero.jpg" alt="Santuario del Antiguo Testamento" class="santuario-hero"> -->
    
    <div class="splash-content">
      
      <!-- 🌟 Mensaje de Bienvenida Sagrado -->
      <div class="welcome-message">
        <div class="welcome-header">
          <h1 class="welcome-title">El Santuario <br> Celestial</h1>
        </div>
      </div>

      <!-- 🚪 Botón Principal del Santuario -->
      <button id="enter-sanctuary-btn" class="enter-btn">
        <span class="door-text">Iniciar <br> recorrido</span>
      </button>
      
    </div>
  </div>

  <!-- 📜 Scripts del Santuario -->
  <script>
    // Variables globales para el control del loader
    let imagesLoaded = false;
    let minTimeElapsed = false;
    const MIN_LOADING_TIME = 1500; // Mostrar loader mínimo 1.5 segundos

    // Ocultar pantalla de carga cuando todo está listo
    function hideLoadingScreen() {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
        loadingScreen.classList.add('hidden');
      }
    }

    // Verificar si puede ocultarse el loader
    function checkCanHide() {
      if (imagesLoaded && minTimeElapsed) {
        hideLoadingScreen();
      }
    }

    // Esperar a que todas las imágenes se carguen
    function waitForImages() {
      const images = document.querySelectorAll('img');
      let loadedImages = 0;
      const totalImages = images.length;

      if (totalImages === 0) {
        imagesLoaded = true;
        checkCanHide();
        return;
      }

      images.forEach((img) => {
        const onImageLoad = () => {
          loadedImages++;
          if (loadedImages === totalImages) {
            imagesLoaded = true;
            checkCanHide();
          }
        };

        // Si la imagen ya está en caché
        if (img.complete) {
          onImageLoad();
        } else {
          img.addEventListener('load', onImageLoad);
          img.addEventListener('error', onImageLoad); // Contar errores también
        }
      });
    }

    // Establecer tiempo mínimo de visualización
    setTimeout(() => {
      minTimeElapsed = true;
      checkCanHide();
    }, MIN_LOADING_TIME);

    // Ejecutar cuando el DOM esté listo
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', waitForImages);
    } else {
      waitForImages();
    }

    // Timeout de seguridad (máximo 5 segundos mostrando el loader)
    setTimeout(() => {
      imagesLoaded = true;
      minTimeElapsed = true;
      hideLoadingScreen();
    }, 5000);
  </script>
  <script src="assets/js/protection.js"></script>
  <script src="assets/js/advanced-protection.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
