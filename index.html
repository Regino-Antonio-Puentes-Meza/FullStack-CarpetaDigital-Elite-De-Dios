<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elíte de Dios - Archivo Digital del Santuario</title>
  
  <!-- Estilos del Santuario -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive-santuario.css" />
  
  <!-- Tipografía Sagrada - Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Protecciones de seguridad -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <style>
    /* Protección selectiva - preserva funcionalidad UI */
    * { 
      -webkit-user-select: none !important; 
      -moz-user-select: none !important; 
      -ms-user-select: none !important; 
      user-select: none !important;
      -webkit-user-drag: none !important;
      -webkit-touch-callout: none !important;
    }
    body { 
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      pointer-events: auto !important;
    }
    /* Permitir interacción en elementos funcionales */
    button, .splash-button, .enter-button, .enter-btn, #enter-sanctuary-btn { 
      pointer-events: auto !important;
    }
    /* Proteger imágenes pero permitir funcionalidad */
    img { 
      -webkit-user-drag: none !important;
      pointer-events: auto !important;
    }
    /* Asegurar visibilidad del botón */
    .enter-btn {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
  </style>
</head>
<body>

  <!-- 🏛️ Pantalla de Bienvenida del Santuario -->
  <div id="splash-screen" class="splash-screen">
    
    <!-- 🌊 Velo de colores visible adicional -->
    <div class="velo-colores-visible"></div>
    
    <!-- Imagen Hero del Santuario (se agregará después) -->
    <!-- <img src="assets/img/santuario-hero.jpg" alt="Santuario del Antiguo Testamento" class="santuario-hero"> -->
    
    <div class="splash-content">
      
      <!-- 🌟 Mensaje de Bienvenida Sagrado -->
      <div class="welcome-message">
        <div class="welcome-header">
          <h1 class="welcome-title">El Santuario <br> Celestial</h1>
        </div>
      </div>

      <!-- 🚪 Botón Principal del Santuario -->
      <button id="enter-sanctuary-btn" class="enter-btn">
        <span class="door-text">Iniciar <br> recorrido</span>
      </button>
      
    </div>
  </div>

  <!-- 📜 Scripts del Santuario -->
  <script src="assets/js/protection.js"></script>
  <script src="assets/js/advanced-protection.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
